<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Frequency</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#121212">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg: #121212;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --accent: #10b981;
      
      /* Dynamic Player Bar Variables */
      --pb-bg: rgba(24, 24, 24, 0.95);
      --pb-text: #ffffff;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 3rem 2rem 120px 2rem; 
      user-select: none;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 850px;
      align-content: start;
    }

    @keyframes fadeUpBounce {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Colored Station Cards */
    .card {
      border-radius: 16px;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.08); 
      position: relative;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
      animation: fadeUpBounce 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .card:hover, .card:focus-visible {
      transform: translateY(-6px) scale(1.03);
      filter: brightness(1.1);
      outline: none;
    }

    .card.playing {
      transform: scale(1.05);
      z-index: 2;
    }

    /* Add Custom Station Button */
    .card.add-btn {
      background: transparent !important;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      color: var(--text-muted);
    }
    .card.add-btn:hover { border-color: var(--text); color: var(--text); }
    .card.add-btn i { font-size: 2rem; margin-bottom: 0.8rem; }

    /* Seamless Logos */
    .card img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      margin-bottom: 0.8rem;
      border-radius: 0;
      box-shadow: none;
      filter: none;
      background: transparent;
    }

    .card .name { 
      font-size: 0.85rem; 
      font-weight: 600; 
      text-align: center; 
      letter-spacing: 0.5px;
    }

    .favorite-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 1.1rem;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s, transform 0.2s;
    }
    .favorite-btn:hover { opacity: 1; transform: scale(1.1); }
    .favorite-btn.active { opacity: 1; color: #ff4b2b; }

    /* Dynamic Player Bar */
    .player-bar {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      background-color: var(--pb-bg);
      color: var(--pb-text);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 1.2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      box-sizing: border-box;
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.4s ease, color 0.4s ease;
      z-index: 100;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
    }
    
    .player-bar.active { transform: translateY(0); }

    .now-playing { display: flex; align-items: center; gap: 1rem; width: 30%; }
    .now-playing img { 
      width: 40px; 
      height: 40px; 
      border-radius: 0; 
      object-fit: contain;
    }
    .now-playing .title { font-weight: 700; font-size: 1rem; margin-bottom: 4px;}
    .now-playing .status { font-size: 0.75rem; opacity: 0.8; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;}

    .controls { display: flex; align-items: center; justify-content: center; width: 40%; gap: 1.5rem; }
    
    .play-btn {
      background: var(--pb-text);
      color: var(--pb-bg);
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.2s, background-color 0.4s ease, color 0.4s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .play-btn:hover { transform: scale(1.08); }
    .play-btn:active { transform: scale(0.95); }

    .tools { display: flex; align-items: center; justify-content: flex-end; width: 30%; gap: 1.5rem; color: var(--pb-text); opacity: 0.9;}
    .timer-container, .volume-icon { cursor: pointer; transition: opacity 0.2s; }
    .timer-container:hover, .volume-icon:hover { opacity: 0.7; }
    .timer-container { display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; }
    .timer-text { font-size: 0.85rem; font-variant-numeric: tabular-nums; font-weight: bold; }
    .volume-container { display: flex; align-items: center; gap: 0.8rem; }
    
    input[type=range] { -webkit-appearance: none; width: 90px; background: transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--pb-text); cursor: pointer; margin-top: -5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.3); border-radius: 2px; }

    .fa-spinner { display: none; }
    .is-buffering .fa-spinner { display: block; animation: spin 1s linear infinite; }
    .is-buffering .fa-play, .is-buffering .fa-pause { display: none !important; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
      display: none; justify-content: center; align-items: center; z-index: 200;
      opacity: 0; transition: opacity 0.3s;
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal {
      background: #1e1e1e; padding: 2rem; border-radius: 16px; width: 90%; max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
    }
    .modal h2 { margin-top: 0; font-size: 1.2rem; margin-bottom: 1.5rem; }
    .modal label { display: block; font-size: 0.8rem; margin-bottom: 0.3rem; color: var(--text-muted); }
    .modal input { 
      width: 100%; padding: 0.8rem; margin-bottom: 1rem; border-radius: 8px; 
      border: 1px solid rgba(255,255,255,0.2); background: #121212; color: white; box-sizing: border-box;
    }
    .modal input[type="color"] { padding: 0; height: 40px; cursor: pointer; }
    .modal-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem; }
    .modal-actions button { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    .btn-cancel { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3) !important; }
    .btn-save { background: white; color: black; }
  </style>
</head>
<body>

  <div class="grid" id="grid"></div>

  <div class="player-bar" id="player-bar">
    <div class="now-playing">
      <img id="pb-logo" src="" alt="logo">
      <div>
        <div class="title" id="pb-title">Station Name</div>
        <div class="status" id="pb-status">Ready</div>
      </div>
    </div>
    
    <div class="controls">
      <button class="play-btn" id="play-btn" onclick="togglePlayPause()" tabindex="0">
        <i class="fa-solid fa-play" id="play-icon"></i>
        <i class="fa-solid fa-pause" id="pause-icon" style="display: none;"></i>
        <i class="fa-solid fa-spinner" id="spinner-icon"></i>
      </button>
    </div>
    
    <div class="tools">
      <div class="timer-container" id="timer-btn" onclick="cycleTimer()" tabindex="0">
        <i class="fa-solid fa-moon"></i>
        <span class="timer-text" id="timer-text"></span>
      </div>
      <div class="volume-container">
        <i class="fa-solid fa-volume-low volume-icon" id="vol-icon" onclick="toggleMute()" tabindex="0"></i>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" oninput="updateVolume(this.value)" tabindex="0">
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <h2>Add Custom Station</h2>
      <label>Station Name</label>
      <input type="text" id="cs-name" placeholder="e.g. My Awesome Radio">
      
      <label>Stream URL (mp3/aac)</label>
      <input type="url" id="cs-url" placeholder="https://...">
      
      <label>Logo Image URL (optional)</label>
      <input type="url" id="cs-logo" placeholder="https://.../logo.png">
      
      <label>Brand Background Color</label>
      <input type="color" id="cs-color" value="#ffffff">
      
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
        <button class="btn-save" onclick="saveCustomStation()">Save Station</button>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW setup failed: ', err));
      });
    }

    const defaultStations = [
      {id:"stubru",name:"Studio Brussel",streamUrl:"https://icecast.vrtcdn.be/stubru-high.mp3",logo:"stubru.jpg",bgColor:"#ffffff"},
      {id:"npo3fm",name:"NPO 3FM",streamUrl:"https://icecast.omroep.nl/3fm-bb-mp3",logo:"3fm.png",bgColor:"#15171e"},
      {id:"boenkerz",name:"Boenkerz",streamUrl:"https://altair.streamerr.co:8096/boenkerz",logo:"boenkerz.jpg",bgColor:"#ffffff"},
      {id:"tijdloze",name:"De Tijdloze",streamUrl:"https://icecast.vrtcdn.be/stubru_tijdloze-high.mp3",logo:"detijdloze.png",bgColor:"#ffe682"},
      {id:"mnm",name:"MNM",streamUrl:"https://icecast.vrtcdn.be/mnm-high.mp3",logo:"mnm.png",bgColor:"#feff56"},
      {id:"topradio",name:"TOPradio",streamUrl:"https://27783.live.streamtheworld.com/TOP_RADIO.mp3",logo:"top.png",bgColor:"#ffffff"},
      {id:"radio1",name:"Radio 1",streamUrl:"https://icecast.vrtcdn.be/radio1-high.mp3",logo:"radio1.png",bgColor:"#ffffff"},
      {id:"npo1",name:"NPO Radio 1",streamUrl:"https://icecast.omroep.nl/radio1-bb-aac",logo:"npo1.png",bgColor:"#1953ff"},
      {id:"qmusic",name:"Qmusic",streamUrl:"https://icecast-qmusicbe-cdp.triple-it.nl/qmusic.mp3",logo:"qmusic.png",bgColor:"#ffffff"},
      {id:"joe",name:"JOE",streamUrl:"https://streams.radio.dpgmedia.cloud/redirect/joe_fm/mp3",logo:"joe.png",bgColor:"#1a52b3"},
      {id:"willy",name:"Willy",streamUrl:"https://icecast-qmusicbe-cdp.triple-it.nl/willy.mp3",logo:"willy.png",bgColor:"#000000"}
    ];

    const audio = new Audio();
    let activeStation = null;
    let prevVolume = 1;
    let favorites = JSON.parse(localStorage.getItem('freq_favorites')) || [];
    let customStations = JSON.parse(localStorage.getItem('freq_custom_stations')) || [];

    // Timer logic
    const timerCycles = [0, 15, 30, 60]; 
    let currentTimerCycleIndex = 0;
    let sleepTimeRemaining = 0;
    let timerInterval = null;

    function getAllStations() {
      return [...defaultStations, ...customStations];
    }

    function getContrastColor(hexColor) {
      if (!hexColor) return '#ffffff';
      let hex = hexColor.replace('#', '');
      let r = parseInt(hex.substr(0, 2), 16);
      let g = parseInt(hex.substr(2, 2), 16);
      let b = parseInt(hex.substr(4, 2), 16);
      let yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
      return (yiq >= 128) ? '#000000' : '#ffffff';
    }

    function hexToRgba(hex, alpha) {
      let h = hex.replace('#', '');
      if(h.length === 3) h = h.split('').map(c => c+c).join('');
      let r = parseInt(h.substring(0,2), 16);
      let g = parseInt(h.substring(2,4), 16);
      let b = parseInt(h.substring(4,6), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    audio.addEventListener('waiting', () => {
        updatePlayerUI('buffering');
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
    });
    audio.addEventListener('playing', () => {
        updatePlayerUI('playing');
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    });
    audio.addEventListener('pause', () => {
        updatePlayerUI('paused');
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
    });

    function getSortedStations() {
      return getAllStations().sort((a, b) => {
        const aFav = favorites.includes(a.id) ? 1 : 0;
        const bFav = favorites.includes(b.id) ? 1 : 0;
        return bFav - aFav; 
      });
    }

    function initGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const sortedStations = getSortedStations();

      sortedStations.forEach((station, index) => {
        const textColor = getContrastColor(station.bgColor);
        const isFav = favorites.includes(station.id);
        
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${station.id}`;
        card.tabIndex = 0; 
        
        card.style.animationDelay = `${index * 0.05}s`;
        card.style.backgroundColor = station.bgColor || '#1e1e1e';
        card.style.color = textColor;

        if (activeStation && activeStation.id === station.id) {
          card.classList.add('playing');
          const glowColor = station.bgColor === '#000000' ? '#555555' : station.bgColor;
          card.style.boxShadow = `0 0 0 4px var(--bg), 0 0 0 8px ${glowColor}, 0 15px 30px rgba(0,0,0,0.5)`;
        }

        card.onclick = () => selectStation(station);
        card.onkeydown = (e) => {
            if (e.key === 'Enter') { e.preventDefault(); selectStation(station); }
        };

        const heartClass = isFav ? 'fa-solid active' : 'fa-regular';
        // Use a generic icon if logo fails to load or isn't provided
        const logoHTML = station.logo 
            ? `<img src="${station.logo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
               <i class="fa-solid fa-radio" style="display:none; font-size: 2rem; margin-bottom: 0.8rem; color: ${textColor}; opacity: 0.5;"></i>`
            : `<i class="fa-solid fa-radio" style="font-size: 2rem; margin-bottom: 0.8rem; color: ${textColor}; opacity: 0.5;"></i>`;

        card.innerHTML = `
          <i class="${heartClass} fa-heart favorite-btn" 
             onclick="toggleFavorite(event, '${station.id}')" tabindex="0"></i>
          ${logoHTML}
          <div class="name">${station.name}</div>
        `;
        grid.appendChild(card);
      });

      // Append "Add Custom Station" Button
      const addBtn = document.createElement('div');
      addBtn.className = 'card add-btn';
      addBtn.tabIndex = 0;
      addBtn.onclick = openAddModal;
      addBtn.onkeydown = (e) => { if (e.key === 'Enter') openAddModal(); };
      addBtn.innerHTML = `
        <i class="fa-solid fa-plus"></i>
        <div class="name">Add Custom</div>
      `;
      grid.appendChild(addBtn);
    }

    function toggleFavorite(e, id) {
        e.stopPropagation(); 
        if (favorites.includes(id)) favorites = favorites.filter(favId => favId !== id);
        else favorites.push(id);
        
        localStorage.setItem('freq_favorites', JSON.stringify(favorites));
        initGrid(); 
    }

    function updateGridStyles(activeStationId) {
      const sortedStations = getSortedStations();
      sortedStations.forEach(station => {
        const card = document.getElementById(`card-${station.id}`);
        if (!card) return;

        if (station.id === activeStationId) {
          card.classList.add('playing');
          const glowColor = station.bgColor === '#000000' ? '#555555' : station.bgColor;
          card.style.boxShadow = `0 0 0 4px var(--bg), 0 0 0 8px ${glowColor}, 0 15px 30px rgba(0,0,0,0.5)`;
        } else {
          card.classList.remove('playing');
          card.style.boxShadow = 'none';
        }
      });
    }

    function selectStation(station) {
      if (activeStation && activeStation.id === station.id) {
        togglePlayPause();
      } else {
        activeStation = station;
        audio.src = station.streamUrl;
        audio.play();
        
        document.title = `${station.name} | Frequency`;
        
        document.getElementById('player-bar').classList.add('active');
        document.getElementById('pb-title').innerText = station.name;
        
        const logoImg = document.getElementById('pb-logo');
        if(station.logo) {
            logoImg.style.display = 'block';
            logoImg.src = station.logo;
        } else {
            logoImg.style.display = 'none';
        }

        // DYNAMIC COLOR TRANSFORMATION (RESTORED)
        const textColor = getContrastColor(station.bgColor);
        const glassBg = hexToRgba(station.bgColor || '#181818', 0.95);
        
        document.documentElement.style.setProperty('--pb-bg', glassBg);
        document.documentElement.style.setProperty('--pb-text', textColor);

        if ('mediaSession' in navigator) {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: station.name,
            artist: 'Frequency Radio',
            artwork: station.logo ? [{ src: station.logo, sizes: '512x512', type: 'image/png' }] : []
          });
          navigator.mediaSession.setActionHandler('play', () => audio.play());
          navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        }
      }
      updateGridStyles(station.id);
    }

    function togglePlayPause() {
      if (!activeStation) return;
      if (audio.paused) audio.play();
      else audio.pause();
    }

    window.addEventListener('keydown', (e) => {
      if(e.code === 'Space' && activeStation && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'BUTTON') {
        e.preventDefault();
        togglePlayPause();
      }
    });

    function updateVolume(val) {
      audio.volume = val;
      if (val > 0) audio.muted = false;
      updateVolumeIcon();
    }

    function toggleMute() {
      const slider = document.getElementById('volume-slider');
      if (audio.muted || audio.volume === 0) {
        audio.muted = false;
        slider.value = prevVolume > 0 ? prevVolume : 1;
        audio.volume = slider.value;
      } else {
        prevVolume = audio.volume;
        audio.muted = true;
        slider.value = 0;
      }
      updateVolumeIcon();
    }

    function updateVolumeIcon() {
      const icon = document.getElementById('vol-icon');
      if (audio.muted || audio.volume === 0) icon.className = 'fa-solid fa-volume-xmark volume-icon';
      else if (audio.volume < 0.5) icon.className = 'fa-solid fa-volume-low volume-icon';
      else icon.className = 'fa-solid fa-volume-high volume-icon';
    }

    function cycleTimer() {
      currentTimerCycleIndex = (currentTimerCycleIndex + 1) % timerCycles.length;
      const minutes = timerCycles[currentTimerCycleIndex];
      clearInterval(timerInterval);
      const timerText = document.getElementById('timer-text');

      if (minutes === 0) timerText.innerText = '';
      else {
        sleepTimeRemaining = minutes * 60;
        updateTimerDisplay();
        timerInterval = setInterval(() => {
          sleepTimeRemaining--;
          updateTimerDisplay();
          if (sleepTimeRemaining <= 0) {
            clearInterval(timerInterval);
            audio.pause();
            currentTimerCycleIndex = 0;
            timerText.innerText = '';
          }
        }, 1000);
      }
    }

    function updateTimerDisplay() {
      const m = Math.floor(sleepTimeRemaining / 60);
      const s = sleepTimeRemaining % 60;
      document.getElementById('timer-text').innerText = `${m}:${s.toString().padStart(2, '0')}`;
    }

    function updatePlayerUI(state) {
      const btn = document.getElementById('play-btn');
      const status = document.getElementById('pb-status');
      
      btn.classList.remove('is-buffering');
      document.getElementById('play-icon').style.display = 'none';
      document.getElementById('pause-icon').style.display = 'none';

      if (state === 'buffering') {
        btn.classList.add('is-buffering');
        status.innerText = "Buffering...";
      } else if (state === 'playing') {
        document.getElementById('pause-icon').style.display = 'block';
        status.innerText = "Live Broadcast";
      } else if (state === 'paused') {
        document.getElementById('play-icon').style.display = 'block';
        status.innerText = "Paused";
      }
    }

    // Modal Logic
    function openAddModal() { document.getElementById('add-modal').classList.add('active'); }
    function closeAddModal() { 
        document.getElementById('add-modal').classList.remove('active'); 
        // Clear inputs
        document.getElementById('cs-name').value = '';
        document.getElementById('cs-url').value = '';
        document.getElementById('cs-logo').value = '';
        document.getElementById('cs-color').value = '#ffffff';
    }
    
    function saveCustomStation() {
        const name = document.getElementById('cs-name').value.trim();
        const url = document.getElementById('cs-url').value.trim();
        const logo = document.getElementById('cs-logo').value.trim();
        const color = document.getElementById('cs-color').value;

        if(!name || !url) return alert('Station Name and Stream URL are required!');

        const newStation = {
            id: 'custom_' + Date.now(),
            name: name,
            streamUrl: url,
            logo: logo || null,
            bgColor: color
        };

        customStations.push(newStation);
        localStorage.setItem('freq_custom_stations', JSON.stringify(customStations));
        
        closeAddModal();
        initGrid(); // Refresh to show new station
    }

    initGrid();
  </script>
</body>
</html>
