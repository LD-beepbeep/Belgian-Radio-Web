<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Frequency</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#121212">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg: #121212;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --accent: #10b981;
      
      /* Dynamic Player Bar Variables */
      --pb-bg: rgba(24, 24, 24, 0.9);
      --pb-text: #ffffff;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 3rem 2rem 120px 2rem; 
      user-select: none;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 850px;
      align-content: start;
    }

    /* Premium Entrance Animation */
    @keyframes fadeUpBounce {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      60% { opacity: 1; transform: translateY(-5px) scale(1.02); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Colored Station Cards */
    .card {
      border-radius: 16px;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.08); 
      position: relative; /* For absolute positioning of favorite icon */
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
      animation: fadeUpBounce 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .card:hover, .card:focus-visible {
      transform: translateY(-6px) scale(1.03);
      filter: brightness(1.1);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      outline: none;
    }

    .card:focus-visible {
      border-color: var(--text);
    }

    .card.playing {
      transform: scale(1.05);
      z-index: 2;
    }

    .card img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin-bottom: 1rem;
      border-radius: 12px;
      box-shadow: none; /* Removed shadow per request */
    }

    .card .name { 
      font-size: 0.9rem; 
      font-weight: 600; 
      text-align: center; 
      letter-spacing: 0.5px;
    }

    .favorite-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s, transform 0.2s;
    }
    .favorite-btn:hover, .favorite-btn:focus-visible {
      opacity: 1;
      transform: scale(1.1);
      outline: none;
    }
    .favorite-btn.active {
      opacity: 1;
    }

    /* Dynamic Player Bar */
    .player-bar {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      background-color: var(--pb-bg);
      color: var(--pb-text);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 1.2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      box-sizing: border-box;
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.4s ease, color 0.4s ease;
      z-index: 100;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
    }
    
    .player-bar.active { transform: translateY(0); }

    .now-playing { display: flex; align-items: center; gap: 1rem; width: 30%; }
    .now-playing img { width: 50px; height: 50px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .now-playing .title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; letter-spacing: 0.5px;}
    .now-playing .status { font-size: 0.75rem; opacity: 0.8; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;}

    /* Controls */
    .controls { display: flex; align-items: center; justify-content: center; width: 40%; gap: 1.5rem; }
    
    .play-btn {
      background: var(--pb-text);
      color: var(--pb-bg);
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.4s ease, color 0.4s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .play-btn:hover { transform: scale(1.08); }
    .play-btn:active { transform: scale(0.95); }

    /* Tools */
    .tools { 
      display: flex; 
      align-items: center; 
      justify-content: flex-end; 
      width: 30%; 
      gap: 1.5rem; 
      color: var(--pb-text);
      opacity: 0.9;
    }

    .timer-container, .volume-icon { cursor: pointer; transition: opacity 0.2s; }
    .timer-container:hover, .volume-icon:hover { opacity: 0.7; }
    
    .timer-container { display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; }
    .timer-text { font-size: 0.85rem; font-variant-numeric: tabular-nums; font-weight: bold; }

    .volume-container { display: flex; align-items: center; gap: 0.8rem; }
    
    input[type=range] {
      -webkit-appearance: none;
      width: 90px;
      background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 14px; width: 14px;
      border-radius: 50%;
      background: var(--pb-text);
      cursor: pointer;
      margin-top: -5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%; height: 4px;
      cursor: pointer;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
    }

    /* Spinner */
    .fa-spinner { display: none; }
    .is-buffering .fa-spinner { display: block; animation: spin 1s linear infinite; }
    .is-buffering .fa-play, .is-buffering .fa-pause { display: none !important; }

    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="grid" id="grid"></div>

  <div class="player-bar" id="player-bar">
    <div class="now-playing">
      <img id="pb-logo" src="" alt="logo">
      <div>
        <div class="title" id="pb-title">Station Name</div>
        <div class="status" id="pb-status">Ready</div>
      </div>
    </div>
    
    <div class="controls">
      <button class="play-btn" id="play-btn" onclick="togglePlayPause()" tabindex="0">
        <i class="fa-solid fa-play" id="play-icon"></i>
        <i class="fa-solid fa-pause" id="pause-icon" style="display: none;"></i>
        <i class="fa-solid fa-spinner" id="spinner-icon"></i>
      </button>
    </div>
    
    <div class="tools">
      <div class="timer-container" id="timer-btn" onclick="cycleTimer()" tabindex="0" onkeydown="if(event.key==='Enter') cycleTimer()">
        <i class="fa-solid fa-moon"></i>
        <span class="timer-text" id="timer-text"></span>
      </div>
      <div class="volume-container">
        <i class="fa-solid fa-volume-low volume-icon" id="vol-icon" onclick="toggleMute()" tabindex="0" onkeydown="if(event.key==='Enter') toggleMute()"></i>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" oninput="updateVolume(this.value)" tabindex="0">
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW setup failed: ', err));
      });
    }

    const stations = [
      {id:"stubru",name:"Studio Brussel",streamUrl:"https://icecast.vrtcdn.be/stubru-high.mp3",logo:"stubru.jpg",bgColor:"#ffffff"},
      {id:"boenkerz",name:"Boenkerz",streamUrl:"https://altair.streamerr.co:8096/boenkerz",logo:"boenkerz.jpg",bgColor:"#ffffff"},
      {id:"tijdloze",name:"De Tijdloze",streamUrl:"https://icecast.vrtcdn.be/stubru_tijdloze-high.mp3",logo:"detijdloze.png",bgColor:"#ffe682"},
      {id:"mnm",name:"MNM",streamUrl:"https://icecast.vrtcdn.be/mnm-high.mp3",logo:"mnm.png",bgColor:"#feff56"},
      {id:"topradio",name:"TOPradio",streamUrl:"https://27783.live.streamtheworld.com/TOP_RADIO.mp3",logo:"top.png",bgColor:"#ffffff"},
      {id:"radio1",name:"Radio 1",streamUrl:"https://icecast.vrtcdn.be/radio1-high.mp3",logo:"radio1.png",bgColor:"#ffffff"},
      {id:"npo3fm",name:"NPO 3FM",streamUrl:"https://icecast.omroep.nl/3fm-bb-mp3",logo:"3fm.png",bgColor:"#15171E"},
      {id:"qmusic",name:"Qmusic",streamUrl:"https://icecast-qmusicbe-cdp.triple-it.nl/qmusic.mp3",logo:"qmusic.png",bgColor:"#ffffff"},
      {id:"joe",name:"JOE",streamUrl:"https://streams.radio.dpgmedia.cloud/redirect/joe_fm/mp3",logo:"joe.png",bgColor:"#1a52b3"},
      {id:"willy",name:"Willy",streamUrl:"https://icecast-qmusicbe-cdp.triple-it.nl/willy.mp3",logo:"willy.png",bgColor:"#000000"}
    ];

    const audio = new Audio();
    let activeStation = null;
    let prevVolume = 1;
    let favorites = JSON.parse(localStorage.getItem('freq_favorites')) || [];

    // Timer logic
    const timerCycles = [0, 15, 30, 60]; 
    let currentTimerCycleIndex = 0;
    let sleepTimeRemaining = 0;
    let timerInterval = null;

    function getContrastColor(hexColor) {
      if (!hexColor) return '#ffffff';
      let hex = hexColor.replace('#', '');
      let r = parseInt(hex.substr(0, 2), 16);
      let g = parseInt(hex.substr(2, 2), 16);
      let b = parseInt(hex.substr(4, 2), 16);
      let yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
      return (yiq >= 128) ? '#000000' : '#ffffff';
    }

    function hexToRgba(hex, alpha) {
      let h = hex.replace('#', '');
      if(h.length === 3) h = h.split('').map(c => c+c).join('');
      let r = parseInt(h.substring(0,2), 16);
      let g = parseInt(h.substring(2,4), 16);
      let b = parseInt(h.substring(4,6), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    // Media Session Tracking & UI State Updates
    audio.addEventListener('waiting', () => {
        updatePlayerUI('buffering');
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
    });
    audio.addEventListener('playing', () => {
        updatePlayerUI('playing');
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    });
    audio.addEventListener('pause', () => {
        updatePlayerUI('paused');
        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
    });

    function getSortedStations() {
      return [...stations].sort((a, b) => {
        const aFav = favorites.includes(a.id) ? 1 : 0;
        const bFav = favorites.includes(b.id) ? 1 : 0;
        return bFav - aFav; // Favorites bubble to the top
      });
    }

    function initGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const sortedStations = getSortedStations();

      sortedStations.forEach((station, index) => {
        const textColor = getContrastColor(station.bgColor);
        const isFav = favorites.includes(station.id);
        
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${station.id}`;
        card.tabIndex = 0; // Keyboard Accessibility
        
        // Disable animation if re-rendering due to favorites toggle
        card.style.animationDelay = `${index * 0.05}s`;
        card.style.backgroundColor = station.bgColor || '#1e1e1e';
        card.style.color = textColor;

        // Restore active styling if playing
        if (activeStation && activeStation.id === station.id) {
          card.classList.add('playing');
          const glowColor = station.bgColor === '#000000' ? '#555555' : station.bgColor;
          card.style.boxShadow = `0 0 0 4px var(--bg), 0 0 0 8px ${glowColor}, 0 15px 30px rgba(0,0,0,0.5)`;
        }

        // Mouse click and Keyboard Enter selection
        card.onclick = () => selectStation(station);
        card.onkeydown = (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                selectStation(station);
            }
        };

        const heartClass = isFav ? 'fa-solid active' : 'fa-regular';
        
        card.innerHTML = `
          <i class="${heartClass} fa-heart favorite-btn" 
             onclick="toggleFavorite(event, '${station.id}')"
             onkeydown="handleFavKey(event, '${station.id}')" 
             tabindex="0" aria-label="Toggle Favorite"></i>
          <img src="${station.logo}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'64\\' height=\\'64\\'><rect width=\\'64\\' height=\\'64\\' fill=\\'%23333\\'/></svg>'">
          <div class="name">${station.name}</div>
        `;
        grid.appendChild(card);
      });
    }

    function toggleFavorite(e, id) {
        e.stopPropagation(); // Prevents clicking the card beneath
        if (favorites.includes(id)) {
            favorites = favorites.filter(favId => favId !== id);
        } else {
            favorites.push(id);
        }
        localStorage.setItem('freq_favorites', JSON.stringify(favorites));
        // Re-render grid to apply sorting
        initGrid(); 
    }

    function handleFavKey(e, id) {
        if (e.key === 'Enter') {
            e.preventDefault();
            toggleFavorite(e, id);
        }
    }

    function updateGridStyles(activeStationId) {
      const sortedStations = getSortedStations();
      sortedStations.forEach(station => {
        const card = document.getElementById(`card-${station.id}`);
        if (!card) return;

        if (station.id === activeStationId) {
          card.classList.add('playing');
          const glowColor = station.bgColor === '#000000' ? '#555555' : station.bgColor;
          card.style.boxShadow = `0 0 0 4px var(--bg), 0 0 0 8px ${glowColor}, 0 15px 30px rgba(0,0,0,0.5)`;
        } else {
          card.classList.remove('playing');
          card.style.boxShadow = 'none';
        }
      });
    }

    function selectStation(station) {
      if (activeStation && activeStation.id === station.id) {
        togglePlayPause();
      } else {
        activeStation = station;
        audio.src = station.streamUrl;
        audio.play();
        
        // Dynamic App Title
        document.title = `${station.name} - Frequency`;
        
        // Update Player Bar Content
        document.getElementById('player-bar').classList.add('active');
        document.getElementById('pb-title').innerText = station.name;
        document.getElementById('pb-logo').src = station.logo;

        // Apply dynamic colors to the player bar
        const textColor = getContrastColor(station.bgColor);
        const glassBg = hexToRgba(station.bgColor || '#181818', 0.85);
        
        document.documentElement.style.setProperty('--pb-bg', glassBg);
        document.documentElement.style.setProperty('--pb-text', textColor);

        // Hardware Media Controls (Control Center & Keyboard Buttons)
        if ('mediaSession' in navigator) {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: station.name,
            artist: 'Frequency Radio',
            artwork: [{ src: station.logo, sizes: '512x512', type: 'image/png' }]
          });
          navigator.mediaSession.setActionHandler('play', () => audio.play());
          navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        }
      }
      updateGridStyles(station.id);
    }

    function togglePlayPause() {
      if (!activeStation) return;
      if (audio.paused) audio.play();
      else audio.pause();
    }

    // Keyboard controls (Spacebar to play/pause globally)
    window.addEventListener('keydown', (e) => {
      // Don't trigger spacebar play/pause if navigating buttons
      if(e.code === 'Space' && activeStation && document.activeElement.tagName !== 'BUTTON' && document.activeElement.tagName !== 'I' && !document.activeElement.classList.contains('card')) {
        e.preventDefault();
        togglePlayPause();
      }
    });

    function updateVolume(val) {
      audio.volume = val;
      if (val > 0) audio.muted = false;
      updateVolumeIcon();
    }

    function toggleMute() {
      const slider = document.getElementById('volume-slider');
      if (audio.muted || audio.volume === 0) {
        audio.muted = false;
        slider.value = prevVolume > 0 ? prevVolume : 1;
        audio.volume = slider.value;
      } else {
        prevVolume = audio.volume;
        audio.muted = true;
        slider.value = 0;
      }
      updateVolumeIcon();
    }

    function updateVolumeIcon() {
      const icon = document.getElementById('vol-icon');
      if (audio.muted || audio.volume === 0) {
        icon.className = 'fa-solid fa-volume-xmark volume-icon';
      } else if (audio.volume < 0.5) {
        icon.className = 'fa-solid fa-volume-low volume-icon';
      } else {
        icon.className = 'fa-solid fa-volume-high volume-icon';
      }
    }

    function cycleTimer() {
      currentTimerCycleIndex = (currentTimerCycleIndex + 1) % timerCycles.length;
      const minutes = timerCycles[currentTimerCycleIndex];
      
      clearInterval(timerInterval);
      const timerText = document.getElementById('timer-text');

      if (minutes === 0) {
        timerText.innerText = '';
      } else {
        sleepTimeRemaining = minutes * 60;
        updateTimerDisplay();
        
        timerInterval = setInterval(() => {
          sleepTimeRemaining--;
          updateTimerDisplay();
          
          if (sleepTimeRemaining <= 0) {
            clearInterval(timerInterval);
            audio.pause();
            currentTimerCycleIndex = 0;
            timerText.innerText = '';
          }
        }, 1000);
      }
    }

    function updateTimerDisplay() {
      const m = Math.floor(sleepTimeRemaining / 60);
      const s = sleepTimeRemaining % 60;
      document.getElementById('timer-text').innerText = `${m}:${s.toString().padStart(2, '0')}`;
    }

    function updatePlayerUI(state) {
      const btn = document.getElementById('play-btn');
      const status = document.getElementById('pb-status');
      
      btn.classList.remove('is-buffering');
      document.getElementById('play-icon').style.display = 'none';
      document.getElementById('pause-icon').style.display = 'none';

      if (state === 'buffering') {
        btn.classList.add('is-buffering');
        status.innerText = "Buffering...";
      } else if (state === 'playing') {
        document.getElementById('pause-icon').style.display = 'block';
        status.innerText = "Live Broadcast";
      } else if (state === 'paused') {
        document.getElementById('play-icon').style.display = 'block';
        status.innerText = "Paused";
      }
      // Removed the endless rendering loop from here!
    }

    // Initialize the grid on first load
    initGrid();
  </script>
</body>
</html>
