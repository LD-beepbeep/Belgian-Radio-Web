<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Frequency</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#121212">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg: #121212;
      --card-bg: #1e1e1e;
      --card-hover: #2a2a2a;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --accent: #10b981;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      padding-bottom: 100px; /* Space for the bottom player */
      user-select: none;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 1.2rem;
      width: 100%;
      max-width: 800px;
    }

    /* Station Cards */
    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }

    .card:hover {
      background-color: var(--card-hover);
      transform: translateY(-2px);
    }

    .card.playing {
      border-color: var(--accent);
      background-color: rgba(16, 185, 129, 0.05);
    }

    .card img {
      width: 52px; /* SCALED SMALLER */
      height: 52px;
      object-fit: contain;
      margin-bottom: 1rem;
      border-radius: 8px;
    }

    .card .name { font-size: 0.85rem; font-weight: 600; text-align: center; }

    /* Player Bar */
    .player-bar {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      background-color: rgba(24, 24, 24, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #333;
      box-sizing: border-box;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    
    .player-bar.active { transform: translateY(0); }

    .now-playing { display: flex; align-items: center; gap: 1rem; width: 33%; }
    .now-playing img { width: 44px; height: 44px; border-radius: 8px; }
    .now-playing .title { font-weight: bold; font-size: 0.95rem; margin-bottom: 4px; }
    .now-playing .status { font-size: 0.75rem; color: var(--text-muted); }

    /* Controls */
    .controls { display: flex; align-items: center; justify-content: center; width: 33%; }
    
    .play-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.1s;
    }
    .play-btn:active { transform: scale(0.95); }

    /* Buffering Spinner inside button */
    .fa-spinner { display: none; }
    .is-buffering .fa-spinner { display: block; animation: spin 1s linear infinite; }
    .is-buffering .fa-play, .is-buffering .fa-pause { display: none !important; }

    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>Frequency</h1>
  <div class="grid" id="grid"></div>

  <div class="player-bar" id="player-bar">
    <div class="now-playing">
      <img id="pb-logo" src="" alt="logo">
      <div>
        <div class="title" id="pb-title">Station Name</div>
        <div class="status" id="pb-status">Ready</div>
      </div>
    </div>
    
    <div class="controls">
      <button class="play-btn" id="play-btn" onclick="togglePlayPause()">
        <i class="fa-solid fa-play" id="play-icon"></i>
        <i class="fa-solid fa-pause" id="pause-icon" style="display: none;"></i>
        <i class="fa-solid fa-spinner" id="spinner-icon"></i>
      </button>
    </div>
    
    <div style="width: 33%;"></div> </div>

  <script>
    // Register Service Worker for PWA (Installability)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW setup failed: ', err));
      });
    }

    const stations = [
      {id:"stubru",name:"Studio Brussel",streamUrl:"https://icecast.vrtcdn.be/stubru-high.mp3",logo:"stubru.jpg"},
      {id:"boenkerz",name:"Boenkerz",streamUrl:"https://altair.streamerr.co:8096/boenkerz",logo:"boenkerz.jpg"},
      {id:"tijdloze",name:"De Tijdloze",streamUrl:"https://icecast.vrtcdn.be/stubru_tijdloze-high.mp3",logo:"detijdloze.png"},
      {id:"mnm",name:"MNM",streamUrl:"https://icecast.vrtcdn.be/mnm-high.mp3",logo:"mnm.png"},
      {id:"topradio",name:"TOPradio",streamUrl:"https://27783.live.streamtheworld.com/TOP_RADIO.mp3",logo:"top.png"},
      {id:"radio1",name:"Radio 1",streamUrl:"https://icecast.vrtcdn.be/radio1-high.mp3",logo:"radio1.png"},
      {id:"qmusic",name:"Qmusic",streamUrl:"https://icecast-qmusicbe-cdp.triple-it.nl/qmusic.mp3",logo:"qmusic.png"},
      {id:"joe",name:"JOE",streamUrl:"https://streams.radio.dpgmedia.cloud/redirect/joe_fm/mp3",logo:"joe.png"},
      {id:"willy",name:"Willy",streamUrl:"https://icecast-qmusicbe-cdp.triple-it.nl/willy.mp3",logo:"willy.png"}
    ];

    const audio = new Audio();
    let activeStation = null;

    // Audio Event Listeners
    audio.addEventListener('waiting', () => updatePlayerUI('buffering'));
    audio.addEventListener('playing', () => updatePlayerUI('playing'));
    audio.addEventListener('pause', () => updatePlayerUI('paused'));

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      stations.forEach(station => {
        const isPlaying = activeStation && activeStation.id === station.id;
        const card = document.createElement('div');
        card.className = `card ${isPlaying ? 'playing' : ''}`;
        card.onclick = () => selectStation(station);

        card.innerHTML = `
          <img src="${station.logo}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'52\\' height=\\'52\\'><rect width=\\'52\\' height=\\'52\\' fill=\\'%23333\\'/></svg>'">
          <div class="name">${station.name}</div>
        `;
        grid.appendChild(card);
      });
    }

    function selectStation(station) {
      if (activeStation && activeStation.id === station.id) {
        togglePlayPause();
      } else {
        activeStation = station;
        audio.src = station.streamUrl;
        audio.play();
        
        // Show Player Bar
        document.getElementById('player-bar').classList.add('active');
        document.getElementById('pb-title').innerText = station.name;
        document.getElementById('pb-logo').src = station.logo;
      }
      render();
    }

    function togglePlayPause() {
      if (!activeStation) return;
      if (audio.paused) audio.play();
      else audio.pause();
    }

    function updatePlayerUI(state) {
      const btn = document.getElementById('play-btn');
      const status = document.getElementById('pb-status');
      
      btn.classList.remove('is-buffering');
      document.getElementById('play-icon').style.display = 'none';
      document.getElementById('pause-icon').style.display = 'none';

      if (state === 'buffering') {
        btn.classList.add('is-buffering');
        status.innerText = "Buffering...";
        document.title = `Buffering ${activeStation.name}...`;
      } else if (state === 'playing') {
        document.getElementById('pause-icon').style.display = 'block';
        status.innerText = "Live";
        // DYNAMIC TITLE 
        document.title = `▶ ${activeStation.name} - Frequency`;
      } else if (state === 'paused') {
        document.getElementById('play-icon').style.display = 'block';
        status.innerText = "Paused";
        // RESET TITLE
        document.title = "Frequency";
      }
      render();
    }

    render();
  </script>
</body>
</html>
